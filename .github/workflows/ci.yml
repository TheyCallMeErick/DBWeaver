name: CI

on:
  push:
    branches: [main, wip]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore files.sln

      - name: Build
        run: dotnet build files.sln -c Release --no-restore

      - name: Test
        run: dotnet test files.sln -c Release --no-build --verbosity normal
