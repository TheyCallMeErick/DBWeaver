name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: VisualSqlArchitect-win-x64.exe
          - rid: linux-x64
            os: ubuntu-latest
            artifact: VisualSqlArchitect-linux-x64
          - rid: osx-x64
            os: macos-latest
            artifact: VisualSqlArchitect-osx-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore files.sln

      - name: Test
        run: dotnet test files.sln -c Release --no-restore --verbosity normal

      - name: Publish
        run: >
          dotnet publish src/VisualSqlArchitect.UI/VisualSqlArchitect.UI.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o publish/${{ matrix.rid }}

      - name: Rename binary (Windows)
        if: matrix.rid == 'win-x64'
        run: mv publish/${{ matrix.rid }}/VisualSqlArchitect.UI.exe publish/${{ matrix.rid }}/${{ matrix.artifact }}
        shell: bash

      - name: Rename binary (Linux/macOS)
        if: matrix.rid != 'win-x64'
        run: mv publish/${{ matrix.rid }}/VisualSqlArchitect.UI publish/${{ matrix.rid }}/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.rid }}/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Visual SQL Architect ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/VisualSqlArchitect-win-x64.exe
            artifacts/VisualSqlArchitect-linux-x64
            artifacts/VisualSqlArchitect-osx-x64
