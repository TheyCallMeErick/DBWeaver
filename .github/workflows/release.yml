name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.0)'
        required: true

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            asset_name: DBWeaver-linux-x64.tar.gz
            archive_type: tar
          - rid: linux-arm64
            asset_name: DBWeaver-linux-arm64.tar.gz
            archive_type: tar
          - rid: win-x64
            asset_name: DBWeaver-win-x64.zip
            archive_type: zip
          - rid: osx-x64
            asset_name: DBWeaver-osx-x64.tar.gz
            archive_type: tar
          - rid: osx-arm64
            asset_name: DBWeaver-osx-arm64.tar.gz
            archive_type: tar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          RAW_TAG="${{ github.event.inputs.tag }}"
          if [ -z "$RAW_TAG" ]; then
            RAW_TAG="${{ github.ref_name }}"
          fi

          if [[ "$RAW_TAG" == v* ]]; then
            TAG="$RAW_TAG"
          else
            TAG="v$RAW_TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/DBWeaver.UI/DBWeaver.UI.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --output ./dist/${{ matrix.rid }}/publish \
            --self-contained true \
            --property:PublishSingleFile=true \
            --property:IncludeNativeLibrariesForSelfExtract=true \
            --property:Version=${{ steps.version.outputs.version }} \
            --property:InformationalVersion=${{ steps.version.outputs.version }} \
            --property:DebugType=none \
            --property:DebugSymbols=false

      - name: Package artifact
        shell: bash
        run: |
          if [ "${{ matrix.archive_type }}" = "zip" ]; then
            (
              cd ./dist/${{ matrix.rid }}/publish
              zip -r ../${{ matrix.asset_name }} .
            )
          else
            tar -czf ./dist/${{ matrix.rid }}/${{ matrix.asset_name }} -C ./dist/${{ matrix.rid }}/publish .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./dist/${{ matrix.rid }}/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Determine version
        id: version
        shell: bash
        run: |
          RAW_TAG="${{ github.event.inputs.tag }}"
          if [ -z "$RAW_TAG" ]; then
            RAW_TAG="${{ github.ref_name }}"
          fi

          if [[ "$RAW_TAG" == v* ]]; then
            TAG="$RAW_TAG"
          else
            TAG="v$RAW_TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DBWeaver ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ./artifacts/**/*
